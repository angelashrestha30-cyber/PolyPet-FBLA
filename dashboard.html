<!DOCTYPE html>
<html>
<head>
  <title>PolyPet Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" defer></script>
</head>
<body onload="updateBars()">

<nav>
  <div class="logo">🐾 PolyPet</div>
  <div class="menu">
    <a href="dashboard.html">Home</a>
    <a href="pets.html">Pet Collection</a>
    <a href="schedule.html">Schedule</a>
    <a href="resources.html">Resources</a>
  </div>
</nav>

<div class="container dashboard">

  <!-- PET PANEL -->
  <div class="pet-card">
    <h3 id="petName" onclick="changeName()" style="cursor:pointer;">
      Pika
    </h3>

    <img src="assets/fox.png" alt="Pet Fox">

    <p>Hunger</p>
    <div class="level-bar">
      <div id="hungerFill" class="level-fill"></div>
    </div>

    <p>Hygiene</p>
    <div class="level-bar">
      <div id="hygieneFill" class="level-fill"></div>
    </div>

    <p>Playtime</p>
    <div class="level-bar">
      <div id="playFill" class="level-fill"></div>
    </div>

    <button class="feed" onclick="feed()">Feed</button>
    <button class="wash" onclick="wash()">Wash</button>
    <button class="play" onclick="playTime()">Play</button>
  </div>

  <!-- COURSES -->
  <div class="course-grid">
    <div class="course" onclick="location.href='spanish.html'">
      ⭐ Spanish Basics (Lv 2)
    </div>

    <div class="course" onclick="location.href='kanji.html'">
      ⭐⭐ Kanji Practice (Lv 3)
    </div>

    <div class="course" onclick="location.href='french.html'">
      ⭐ French Phrases (Lv 1)
    </div>

    <div class="course" onclick="location.href='grammar.html'">
      ⭐⭐ Grammar Quiz (Lv 2)
    </div>
  </div>

</div>

</body>
</html>
